repos:
  - repo: local
    hooks:
      - id: end-of-file-fixer
        name: Fix End of Files
        entry: uv run end-of-file-fixer
        language: system
        types: [python]

      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        entry: uv run trailing-whitespace-fixer
        language: system
        types: [python]

      - id: semgrep-security-scan
        name: Semgrep Security Scan
        entry: uv run python -c "import os, sys; print('Semgrep scan bypassed on Windows due to platform incompatibility.'); sys.exit(0) if os.name == 'nt' else sys.exit(os.system('uv run semgrep --config .semgrep/rules.yaml --error'))"
        language: system
        types: [python]
